spring:
  application:
    name: LectureTCI
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/lecturetci}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    hikari:
      data-source-properties:
        prepareThreshold: 0
        preparedStatementCacheQueries: 0
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8765,http://127.0.0.1:8765,https://greatacme.github.io,null}
