<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LectureTCI 강사 화면</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="instructor">
    <header class="topbar">
      <div>
        <p class="eyebrow">LectureTCI</p>
        <h1>강사 화면</h1>
      </div>
      <div class="header-status">
        <span>프로토타입</span>
      </div>
    </header>

    <main>
      <section id="instructor" class="view is-active" aria-labelledby="instructor-title">
        <div class="instructor-grid">
          <section class="panel panel-session">
            <div class="toolbar">
              <div>
                <h2 id="instructor-title">체험 진행 관리</h2>
                <p class="muted">현재 상태: <strong id="session-status">준비</strong></p>
              </div>
              <select id="test-set-select" aria-label="검사SET 선택"></select>
            </div>

            <div class="action-row">
              <button class="primary-button" data-session-action="start">체험 시작</button>
              <button class="secondary-button" data-session-action="close-score">입력 종료 및 결과 취합</button>
              <button class="primary-button" data-session-action="share">결과 공유</button>
              <button class="danger-button" data-session-action="end">체험 종료</button>
            </div>

            <div class="link-grid">
              <div class="session-url-row">
                <span class="label">참여자 URL</span>
                <code id="student-url">student.html?s=LT-4821</code>
                <button class="secondary-button" data-copy-target="student-url">URL 복사</button>
              </div>
              <div class="session-url-row">
                <span class="label">결과 URL</span>
                <code id="result-url">result.html?s=LT-4821</code>
                <button class="secondary-button" data-copy-target="result-url">URL 복사</button>
              </div>
            </div>
          </section>

          <section class="panel panel-dashboard">
            <h2>강사 대시보드</h2>
            <p class="muted">검사SET 선택부터 결과 공유까지 강의 흐름을 제어합니다.</p>
            <div class="metric-grid">
              <div class="metric">
                <span>참여자</span>
                <strong id="participant-count">0</strong>
              </div>
              <div class="metric">
                <span>완료</span>
                <strong id="completed-count">0</strong>
              </div>
            </div>
          </section>

          <section class="panel panel-participants">
            <div class="panel-header">
              <h3>참여자 입력 현황</h3>
              <span class="refresh-label">2초 polling 예정</span>
            </div>
            <div id="participant-list" class="participant-list"></div>
          </section>

          <section class="panel panel-items">
            <div class="panel-header">
              <h3>검사항목 관리</h3>
              <button class="icon-button" title="문항 추가" aria-label="문항 추가">+</button>
            </div>
            <div id="item-list" class="item-list"></div>
          </section>
        </div>
      </section>
    </main>

    <script src="sample-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
