<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LectureTCI 강사 화면</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="instructor">
    <header class="topbar">
      <div>
        <p class="eyebrow">LectureTCI</p>
        <h1>강사 화면</h1>
      </div>
      <div class="header-status">
        <span>프로토타입</span>
      </div>
    </header>

    <main>
      <section id="instructor" class="view is-active" aria-labelledby="instructor-title">
        <div class="instructor-grid">
          <section class="panel panel-session">
            <div class="toolbar">
              <div>
                <h2 id="instructor-title">체험 진행 관리</h2>
                <p class="muted">현재 상태: <strong id="session-status">준비</strong></p>
              </div>
            </div>

            <div class="action-row">
              <button class="primary-button" data-session-action="start">체험 시작</button>
              <button class="secondary-button" data-session-action="close-score">입력 종료<br>결과 취합</button>
              <button class="primary-button" data-session-action="share">결과 공유</button>
              <button class="danger-button" data-session-action="end">체험 종료</button>
            </div>

            <div class="code-control">
              <div>
                <span class="label">강의 코드</span>
                <output id="lecture-code" class="lecture-code">LT-4821</output>
              </div>
              <div class="code-actions">
                <button class="primary-button" id="show-qr" disabled>QR 보기</button>
              </div>
            </div>
          </section>

          <section class="panel panel-dashboard">
            <h2>강사 대시보드</h2>
            <p class="muted">체험 시작부터 결과 공유까지 강의 흐름을 제어합니다.</p>
            <div class="metric-grid">
              <div class="metric">
                <span>참여자</span>
                <strong id="participant-count">0</strong>
              </div>
              <div class="metric">
                <span>완료</span>
                <strong id="completed-count">0</strong>
              </div>
            </div>
          </section>

          <section class="panel panel-participants">
            <div class="panel-header">
              <h3>참여자 입력 현황</h3>
              <span class="refresh-label">2초 polling 예정</span>
            </div>
            <div id="participant-list" class="participant-list"></div>
          </section>
        </div>
      </section>
    </main>

    <dialog class="qr-dialog" id="qr-dialog" aria-labelledby="qr-title">
      <div class="qr-dialog-header">
        <div>
          <p class="eyebrow">참여자 접속</p>
          <h2 id="qr-title">QR 코드</h2>
        </div>
        <button class="icon-button" id="close-qr" aria-label="QR 닫기">x</button>
      </div>
      <div class="qr-body">
        <img id="qr-image" alt="참여자 화면 QR 코드" width="320" height="320">
        <div class="qr-code-box">
          <span>강의 코드</span>
          <strong id="qr-code-text">LT-4821</strong>
        </div>
      </div>
    </dialog>

    <script src="sample-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
