<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LectureTCI 결과 화면</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="result">
    <header class="topbar">
      <div>
        <p class="eyebrow">LectureTCI</p>
        <h1>결과 화면</h1>
      </div>
      <a class="header-link" href="student.html?s=LT-4821">참여자 화면</a>
    </header>

    <main>
      <section id="result" class="view is-active" aria-labelledby="result-title">
        <div class="phone-shell">
          <section class="mobile-screen">
            <p class="eyebrow">개인 결과</p>
            <h2 id="result-title">ENFJ 유사 유형</h2>
            <p class="muted">샘플 응답으로 생성한 예시 결과입니다. 실제 TCI 점수 체계는 운영 버전에서 별도 적용합니다.</p>
            <div class="result-card">
              <span>주요 경향</span>
              <strong>관계 중심 · 직관적 · 계획형</strong>
            </div>
            <div class="score-list">
              <div><span>E</span><progress value="72" max="100"></progress><b>72</b></div>
              <div><span>N</span><progress value="65" max="100"></progress><b>65</b></div>
              <div><span>F</span><progress value="78" max="100"></progress><b>78</b></div>
              <div><span>J</span><progress value="61" max="100"></progress><b>61</b></div>
            </div>
            <a class="secondary-link wide" href="student.html?s=LT-4821">참여자 화면으로</a>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
